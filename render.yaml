services:
  - type: web
    name: api-mi-boleta
    runtime: node
    plan: free
    region: oregon
    branch: master
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
